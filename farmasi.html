<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMKES - Farmasi</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="sidebar">
        <h2>SIMKES</h2>
        <a href="index.html">Dashboard</a>
        <a href="pendaftaran.html">Pendaftaran</a>
        <a href="poli.html">Pemeriksaan Poli</a>
        <a class="active" href="farmasi.html">Farmasi</a>
        <a href="radiologi.html">Radiologi</a>
        <a href="laboratorium.html">Laboratorium</a>
        <a href="kasir.html">Kasir</a>
        <a href="login.html">Logout</a>
    </div>

    <div class="main">

        <div class="card">
            <h2>Resep & Farmasi</h2>

            <input type="text" id="namaPasien" placeholder="Nama Pasien">
            <input type="text" id="obat" placeholder="Nama Obat">
            <input type="number" id="jumlah" placeholder="Jumlah">

            <button id="submit" onclick="tambahObat()">Tambah Obat</button>

        </div>

        <div class="card">
            <h2>Daftar Resep</h2>

            <table>
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Pasien</th>
                        <th>Obat</th>
                        <th>Qty</th>
                        <th>Aksi</th>
                    </tr>
                </thead>

                <tbody id="tableResep"></tbody>
            </table>
        </div>

    </div>

    <script>
        let resep = []
        let indexUpdate = -1
        function tambahObat() {
            let namaPasien = document.getElementById("namaPasien").value.trim()
            let obat = document.getElementById("obat").value
            let jumlah = document.getElementById("jumlah").value
            if (namaPasien) {
                if (indexUpdate !== -1) {
                    resep[indexUpdate] = {
                        namaPasien,
                        obat,
                        jumlah
                    }
                    document.getElementById('submit').innerText = 'Simpan'
                    indexUpdate = -1
                    alert('Data Berhasil diupdate')
                }else{
                    resep.push({
                        namaPasien,
                        obat,
                        jumlah
                    })
                    alert('Data Berhasil disimpan')
                }
                renderTable();
                document.getElementById("namaPasien").value = ''
                document.getElementById("obat").value = ''
                document.getElementById("jumlah").value = ''
            } else {
                alert("Semua Data Harus diisi")
            }
        }
        function renderTable() {
            let html = ''
            resep.forEach((item, index) => {
                html += `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${item.namaPasien}</td>
                        <td>${item.obat}</td>
                        <td>${item.jumlah}</td>
                        <td>
                            <button onclick="updateRegister(${index})">Update</button>
                            <button onclick="deleteRegister(${index})">Delete</button>
                        </td>
                    </tr>
                `
            })

            document.getElementById("tableResep").innerHTML = html
        }
        function deleteRegister(index) {
            let konfirmasi = 
            confirm(`Yakin ingin hapus pasien ${resep[index].namaPasien}?`)
            if (konfirmasi) {
                resep.splice(index, 1)
                renderTable()
                alert('Pasien Berhasil dihapus')
            }
        }
        function updateRegister(index) {
            document.getElementById('submit').innerText = 'Update'
            document.getElementById('namaPasien').value = resep[index].namaPasien
            document.getElementById('obat').value =  resep[index].obat
            document.getElementById('jumlah').value =  resep[index].jumlah
            indexUpdate = index
        }


    
    </script>

</body>

</html>
